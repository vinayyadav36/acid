# =============================================================================
# L.S.D CI Pipeline - Industry Standard 2026
# =============================================================================
# This workflow implements continuous integration with:
# - Multi-version Go testing
# - Dependency caching for speed
# - Code coverage reporting
# - Linting with golangci-lint
# - Build validation
# =============================================================================

name: CI

on:
  push:
    branches: [main, development, testing, beta, staging]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, development, testing, beta, staging]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_STABLE: '1.24.x'
  GO_VERSION_LTS: '1.22.x'
  GOLANGCI_LINT_VERSION: 'v2.0.2'

jobs:
  # ===========================================================================
  # DETECT CHANGES - Smart job execution
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - 'static/**'

  # ===========================================================================
  # LINT - Fast feedback on code quality
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION_STABLE }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=10m --issues-exit-code=0
        continue-on-error: true

  # ===========================================================================
  # TEST MATRIX - Multi-version Go testing
  # ===========================================================================
  test:
    name: Test (Go ${{ matrix.go }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes, lint]
    if: needs.changes.outputs.go == 'true'
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24.x', '1.22.x']
        os: [ubuntu-latest, macos-latest]
        include:
          - go: '1.24.x'
            os: ubuntu-latest
            coverage: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: go test -v -race -timeout=15m ./...

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: go test -v -race -timeout=15m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage artifact
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ===========================================================================
  # COVERAGE REPORT
  # ===========================================================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: unittests
          fail_ci_if_error: false

      - name: Coverage threshold check
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50.0" | bc -l) )); then
            echo "::warning::Coverage ($COVERAGE%) is below 50% threshold"
          fi

  # ===========================================================================
  # BUILD - Validate build across platforms
  # ===========================================================================
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION_STABLE }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="lsd-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o "bin/${BINARY_NAME}" ./cmd/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
          retention-days: 7

  # ===========================================================================
  # WEB VALIDATION
  # ===========================================================================
  web-validation:
    name: Web Assets Validation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          find web -name "*.html" -exec grep -l "<!DOCTYPE" {} \;
          echo "HTML files validated"

  # ===========================================================================
  # CI STATUS - Final status check
  # ===========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, test, build, coverage]
    if: always()
    steps:
      - name: Check overall status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "::error::CI pipeline failed"
            exit 1
          fi
          echo "::notice::CI pipeline passed successfully"

      - name: Generate summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
